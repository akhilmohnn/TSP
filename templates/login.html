{% extends "base.html" %}

{% block title %}Login - Branch Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0">
                    <i class="fas fa-sign-in-alt"></i> Login
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="user_type" class="form-label">Login as:</label>
                        <select class="form-select" id="user_type" name="user_type" required>
                            <option value="">Select User Type</option>
                            <option value="admin">Admin</option>
                            <option value="branch">Branch</option>
                            <option value="auditor">Auditor</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <span id="username-label">Username/Email:</span>
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required>
                        <div class="form-text" id="username-help">
                            Admin: Enter username | Branch: Enter email address | Auditor: Enter auditor ID/email
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <hr>
                <div class="text-center">
                    <p class="mb-0">New branch?</p>
                    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-user-plus"></i> Register Branch
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('user_type').addEventListener('change', function () {
        const userType = this.value;
        const usernameLabel = document.getElementById('username-label');
        const usernameInput = document.getElementById('username');
        const usernameHelp = document.getElementById('username-help');

        if (userType === 'admin') {
            usernameLabel.textContent = 'Username:';
            usernameInput.placeholder = 'Enter admin username';
            usernameHelp.textContent = 'Enter your admin username';
        } else if (userType === 'branch') {
            usernameLabel.textContent = 'Email:';
            usernameInput.placeholder = 'Enter branch email';
            usernameHelp.textContent = 'Enter your branch email address';
        }else if (userType === 'auditor') {   
        usernameLabel.textContent = 'Auditor ID/Email:';
        usernameInput.placeholder = 'Enter auditor ID or email';
        usernameHelp.textContent = 'Enter your auditor ID or email address';
    } else  {
            usernameLabel.textContent = 'Username/Email:';
            usernameInput.placeholder = '';
            usernameHelp.textContent = 'Admin: Enter username | Branch: Enter email address';
        }
    });
</script>
{% endblock %}
